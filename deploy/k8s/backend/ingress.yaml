apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-ai-backend
spec:
  ingressClassName: traefik
  rules:
    - host: secure-ai.lab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: secure-ai-backend
                port:
                  number: 80
